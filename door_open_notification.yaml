blueprint:
  name: "Tür-Offen Benachrichtigung"
  description: |
    🚪 **Tür-Überwachung — All-in-One Blueprint**

    Managt vergessene Türen, erkennt potenzielle Einbrüche und überwacht die Sensor-Gesundheit.

    **Kern-Funktionen:**
    - 🔔 Tür-Offen Erinnerung: Person ist zuhause, Tür steht offen → diese Person wird erinnert.
    - 🚨 Fallback-Alarm: Tür steht zu lange offen → ALLE werden benachrichtigt (normal oder kritisch).
    - 🔐 Einbruch-Erkennung: Niemand zuhause, Tür öffnet sich → sofortiger kritischer Alarm an alle.
    - 🩺 Health-Watchdog: Sensor wird unavailable/unknown → Warnung an Person 1.

    **Features:**
    - 👥 1–4 Personen mit individueller Zone-Erkennung.
    - 📱 Device-Picker für Mobile-App Geräte (kein manuelles Tippen).
    - 🛡️ Self-Healing: Fehler in einem Szenario stoppen nicht die anderen.
    - 🔇 Auto-Stop: Alle Benachrichtigungen enden wenn die Tür geschlossen wird.
    - 🩺 Health-Monitoring: Erkennt wenn der Sensor ausfällt und die Überwachung blind wird.
    - 🐛 Debug-Modus für Diagnose bei Problemen.

    **Version:** 1.3 | **Autor:** BananaPower

  domain: automation
  source_url: https://raw.githubusercontent.com/howtobanana/notification-blueprints/main/door_open_notification.yaml
  author: "bananapower"
  homeassistant:
    min_version: "2024.6.0"

  input:
    # =========================================================================
    #  SEKTION 1: Basis-Einstellungen
    # =========================================================================
    section_base:
      name: "⚙️ Basis-Einstellungen"
      description: |
        Tür-Sensor und Zeitintervalle für alle drei Alarm-Szenarien.

        **Szenario 1 — 🔔 Tür-Offen Erinnerung (Person zuhause):**
        Mindestens eine Person ist in der Home-Zone und die Tür steht offen → nach eingestellter Zeit bekommt jede Person die ZUHAUSE ist eine Erinnerung.

        **Szenario 2 — 🚨 Fallback-Alarm (Sicherheitsabstand):**
        Tür steht über langen Zeitraum durchgehend offen → ALLE Personen werden benachrichtigt. Wahlweise als normaler oder kritischer Alarm.

        **Szenario 3 — 🔐 Einbruch-Erkennung:**
        KEINE Person in der Home-Zone und Tür wird geöffnet → sofortiger kritischer Alarm an alle.
      collapsed: false
      input:
        door_sensor:
          name: "🚪 Tür-Sensor"
          description: |
            Der Binärsensor der zu überwachenden Tür.
            Es werden nur Sensoren mit Device-Class "door" angezeigt (z.B. Aqara, Sonoff, Xiaomi).
            Der Sensor muss "on" = offen und "off" = geschlossen melden.
          selector:
            entity:
              domain: binary_sensor
              device_class: door

        person_left_duration:
          name: "🔔 Tür-Offen Erinnerung: Verzögerung"
          description: |
            Wie viele Sekunden die Tür offen stehen muss, bevor Personen die ZUHAUSE sind eine Erinnerung bekommen.
            Beispiel: Du bist zuhause, Tür steht offen — nach dieser Zeit bekommst du eine Push-Benachrichtigung.
            Empfehlung: 60 Sekunden. Wer nur kurz Müll rausbringt wird nicht gestört.
          default: 60
          selector:
            number:
              min: 10
              max: 600
              step: 5
              unit_of_measurement: "Sekunden"
              mode: slider

        person_left_repeat:
          name: "🔔 Tür-Offen Erinnerung: Wiederholungsintervall"
          description: |
            Alle wie viele Sekunden die Erinnerung wiederholt wird, solange die Tür offen steht.
            Die Benachrichtigung stoppt automatisch sobald die Tür geschlossen wird.
          default: 60
          selector:
            number:
              min: 10
              max: 300
              step: 5
              unit_of_measurement: "Sekunden"
              mode: slider

        person_left_critical_after:
          name: "🔔 Tür-Offen Erinnerung: Eskalation nach (min)"
          description: |
            Nach wie vielen Minuten die Erinnerung von normal auf KRITISCH wechselt.
            Kritische Alarme durchbrechen den Lautlos-/Nicht-Stören-Modus.
            Beispiel: 5 Minuten — die ersten 5 Minuten kommen normale Push-Nachrichten, danach kritische Alarme.
          default: 5
          selector:
            number:
              min: 1
              max: 30
              step: 1
              unit_of_measurement: "Minuten"
              mode: slider

        long_open_duration:
          name: "🚨 Fallback-Alarm: Verzögerung"
          description: |
            Nach wie vielen Minuten ALLE Personen benachrichtigt werden, wenn die Tür durchgehend offen steht — unabhängig davon wer zuhause ist.
            Dies ist der Sicherheits-Fallback für den Fall, dass die Vergessen-Erinnerung ignoriert wird oder niemand reagiert.
            Empfehlung: 20 Minuten ist ein guter Sicherheitsabstand.
          default: 20
          selector:
            number:
              min: 1
              max: 120
              step: 1
              unit_of_measurement: "Minuten"
              mode: slider

        long_open_repeat:
          name: "🚨 Fallback-Alarm: Wiederholungsintervall"
          description: |
            Alle wie viele Sekunden der Fallback-Alarm wiederholt wird, bis die Tür geschlossen wird.
          default: 60
          selector:
            number:
              min: 10
              max: 300
              step: 5
              unit_of_measurement: "Sekunden"
              mode: slider

        long_open_critical:
          name: "🚨 Fallback-Alarm: Kritischer Alarm?"
          description: |
            Wenn aktiviert, wird der Fallback-Alarm als KRITISCHE Benachrichtigung gesendet.
            Kritische Alarme durchbrechen den Lautlos-/Nicht-Stören-Modus auf iOS und Android.
            Wenn deaktiviert, wird eine normale Push-Benachrichtigung gesendet.
          default: false
          selector:
            boolean:

        breakin_duration:
          name: "🔐 Einbruch-Erkennung: Verzögerung"
          description: |
            Wie viele Sekunden die Tür offen stehen muss wenn KEINE Person in der Home-Zone ist, bevor der Einbruch-Alarm ausgelöst wird.
            Kurze Werte (5–10s) empfohlen, um schnell zu reagieren.
            Zu kurze Werte können bei GPS-Ungenauigkeiten Fehlalarme auslösen.
          default: 10
          selector:
            number:
              min: 5
              max: 120
              step: 5
              unit_of_measurement: "Sekunden"
              mode: slider

        breakin_repeat:
          name: "🔐 Einbruch-Erkennung: Wiederholungsintervall"
          description: |
            Alle wie viele Sekunden der Einbruch-Alarm wiederholt wird, bis die Tür geschlossen wird.
            Der Alarm ist immer kritisch und durchbricht den Lautlos-Modus.
          default: 60
          selector:
            number:
              min: 10
              max: 300
              step: 5
              unit_of_measurement: "Sekunden"
              mode: slider

    # =========================================================================
    #  SEKTION 2: Personen & Benachrichtigungen
    # =========================================================================
    section_persons:
      name: "👥 Personen & Benachrichtigungen"
      description: |
        Konfiguriere bis zu 4 Personen mit ihren zugehörigen Mobile-App Geräten.
        Person 1 ist Pflicht, Personen 2–4 optional.

        Jede Person benötigt zwei Angaben:
        **(1)** Die Person-Entität — bestimmt über Zone-Tracking ob die Person zuhause ist oder nicht.
        **(2)** Das Mobile-App Gerät — wird über den Device-Picker ausgewählt.

        **Wichtig:** Die Person-Entität muss korrekt mit einem GPS-Tracker (Companion App, iCloud, etc.) verbunden sein, damit die Zone-Erkennung zuverlässig funktioniert.
      collapsed: false
      input:
        person_1:
          name: "👤 Person 1 (Pflicht)"
          description: |
            Die Haupt-Person. Wird auch für Debug- und Health-Nachrichten verwendet.
          selector:
            entity:
              domain: person

        notify_device_1:
          name: "📱 Notify Gerät Person 1"
          description: |
            Mobile-App Gerät für Person 1.
          selector:
            device:
              filter:
                integration: mobile_app

        person_2:
          name: "👤 Person 2 (optional)"
          description: |
            Zweite Person — leer lassen wenn nicht benötigt.
          default: ""
          selector:
            entity:
              domain: person

        notify_device_2:
          name: "📱 Notify Gerät Person 2"
          description: |
            Mobile-App Gerät für Person 2. Leer lassen wenn Person 2 nicht konfiguriert ist.
          default: ""
          selector:
            device:
              filter:
                integration: mobile_app

        person_3:
          name: "👤 Person 3 (optional)"
          description: |
            Dritte Person — leer lassen wenn nicht benötigt.
          default: ""
          selector:
            entity:
              domain: person

        notify_device_3:
          name: "📱 Notify Gerät Person 3"
          description: |
            Mobile-App Gerät für Person 3. Leer lassen wenn Person 3 nicht konfiguriert ist.
          default: ""
          selector:
            device:
              filter:
                integration: mobile_app

        person_4:
          name: "👤 Person 4 (optional)"
          description: |
            Vierte Person — leer lassen wenn nicht benötigt.
          default: ""
          selector:
            entity:
              domain: person

        notify_device_4:
          name: "📱 Notify Gerät Person 4"
          description: |
            Mobile-App Gerät für Person 4. Leer lassen wenn Person 4 nicht konfiguriert ist.
          default: ""
          selector:
            device:
              filter:
                integration: mobile_app

    # =========================================================================
    #  SEKTION 3: Health-Watchdog
    # =========================================================================
    section_health:
      name: "🩺 Health-Watchdog"
      description: |
        Überwacht die Verfügbarkeit des Tür-Sensors und warnt wenn die Überwachung "blind" wird.

        **Warum das wichtig ist:**
        Wenn der Sensor ausfällt (Batterie leer, Zigbee-Netzwerkproblem, HA-Integration gestört),
        funktioniert KEINE der drei Alarm-Szenarien mehr — und du merkst es nicht.
        Der Watchdog erkennt diesen Zustand und sendet eine Warnung an Person 1.

        **Wann wird gewarnt?**
        Wenn der Sensor-Status für die eingestellte Dauer auf `unavailable` oder `unknown` steht.
        Kurze Ausfälle (< eingestellte Dauer) werden ignoriert — das ist normal bei HA-Neustarts oder Zigbee-Mesh-Reorganisation.

        **Empfehlung:**
        10 Minuten ist ein guter Standardwert. HA-Neustarts dauern typischerweise 2–5 Minuten,
        Zigbee-Hiccups lösen sich in Sekunden auf. Alles über 10 Minuten ist verdächtig.
      collapsed: false
      input:
        health_enabled:
          name: "🩺 Health-Watchdog aktivieren"
          description: |
            Aktiviert die Sensor-Überwachung.
            Bei Ausfall wird eine Warnung an das Gerät von Person 1 gesendet.
            Empfehlung: Immer aktiviert lassen — dies ist dein Sicherheitsnetz.
          default: true
          selector:
            boolean:

        health_unavailable_duration:
          name: "🩺 Unavailable-Toleranz"
          description: |
            Wie viele Minuten der Sensor unavailable/unknown sein darf, bevor der Watchdog warnt.
            Kurze Ausfälle (HA-Neustart, Zigbee-Reorganisation) sind normal und werden damit gefiltert.
            Empfehlung: 10 Minuten. Kürzere Werte können bei HA-Updates Fehlalarme verursachen.
          default: 10
          selector:
            number:
              min: 2
              max: 60
              step: 1
              unit_of_measurement: "Minuten"
              mode: slider

        health_repeat:
          name: "🩺 Watchdog-Wiederholungsintervall"
          description: |
            Alle wie viele Minuten die Warnung wiederholt wird, solange der Sensor unavailable bleibt.
            Der Watchdog stoppt automatisch sobald der Sensor wieder verfügbar ist.
          default: 30
          selector:
            number:
              min: 5
              max: 120
              step: 5
              unit_of_measurement: "Minuten"
              mode: slider

    # =========================================================================
    #  SEKTION 4: Debug & Monitoring
    # =========================================================================
    section_debug:
      name: "🐛 Debug & Monitoring"
      description: |
        Aktiviere den Debug-Modus um Diagnose-Informationen als Push-Benachrichtigung an Person 1 zu erhalten.

        Im Debug-Modus werden folgende Informationen gesendet:
        — Sensor-Status beim Auslösen (verfügbar / unavailable / unknown)
        — Welche Personen zuhause sind und welche nicht
        — Welches Szenario aktiviert wurde (Tür-Offen / Fallback / Einbruch)
        — Watchdog-Status (Sensor-Wechsel zu unavailable/unknown)

        Nützlich bei: Fehlalarmen, ausbleibenden Benachrichtigungen, Problemen mit dem Tür-Sensor oder der Zone-Erkennung.
        Im Normalbetrieb deaktiviert lassen um unnötige Benachrichtigungen zu vermeiden.
      collapsed: true
      input:
        debug_enabled:
          name: "🐛 Debug-Modus aktivieren"
          description: |
            Sendet Diagnose-Informationen bei jedem Auslösen der Automation.
            Alle Debug-Nachrichten werden ausschließlich an das Gerät von Person 1 gesendet.
            Empfehlung: Nur zur Fehlersuche aktivieren, danach wieder deaktivieren.
          default: false
          selector:
            boolean:

# =============================================================================
#  AUTOMATION
# =============================================================================
mode: parallel
max: 4
max_exceeded: silent

trigger_variables:
  tv_health_duration: !input health_unavailable_duration

triggers:
  # --- Tür geöffnet ---
  - trigger: state
    entity_id: !input door_sensor
    to: "on"
    id: door_opened

  # --- Tür geschlossen → Notifications aufräumen ---
  - trigger: state
    entity_id: !input door_sensor
    to: "off"
    id: door_closed

  # --- Sensor unavailable (für eingestellte Dauer) ---
  - trigger: state
    entity_id: !input door_sensor
    to: "unavailable"
    for:
      minutes: !input health_unavailable_duration
    id: sensor_unavailable

  # --- Sensor unknown (für eingestellte Dauer) ---
  - trigger: state
    entity_id: !input door_sensor
    to: "unknown"
    for:
      minutes: !input health_unavailable_duration
    id: sensor_unknown

actions:
  # ---------------------------------------------------------------------------
  #  Variablen
  # ---------------------------------------------------------------------------
  - variables:
      inputs:
        door_sensor: !input door_sensor
        person_1: !input person_1
        person_2: !input person_2
        person_3: !input person_3
        person_4: !input person_4
        notify_device_1: !input notify_device_1
        notify_device_2: !input notify_device_2
        notify_device_3: !input notify_device_3
        notify_device_4: !input notify_device_4
        person_left_duration: !input person_left_duration
        person_left_repeat: !input person_left_repeat
        person_left_critical_after: !input person_left_critical_after
        long_open_duration: !input long_open_duration
        long_open_repeat: !input long_open_repeat
        long_open_critical: !input long_open_critical
        breakin_duration: !input breakin_duration
        breakin_repeat: !input breakin_repeat
        health_enabled: !input health_enabled
        health_repeat: !input health_repeat
        debug_enabled: !input debug_enabled

      # --- Device → Notify-Service Auflösung ---
      notify_service_1: >
        {% set dev = inputs.notify_device_1 | default('') | string | trim %}
        {% if dev != '' %}
          {% set dev_name = device_attr(dev, 'name') %}
          {% if dev_name is string and (dev_name | trim) != '' %}
            notify.mobile_app_{{ (dev_name | slugify) | replace('-', '_') }}
          {% endif %}
        {% endif %}

      notify_service_2: >
        {% set dev = inputs.notify_device_2 | default('') | string | trim %}
        {% if dev != '' %}
          {% set dev_name = device_attr(dev, 'name') %}
          {% if dev_name is string and (dev_name | trim) != '' %}
            notify.mobile_app_{{ (dev_name | slugify) | replace('-', '_') }}
          {% endif %}
        {% endif %}

      notify_service_3: >
        {% set dev = inputs.notify_device_3 | default('') | string | trim %}
        {% if dev != '' %}
          {% set dev_name = device_attr(dev, 'name') %}
          {% if dev_name is string and (dev_name | trim) != '' %}
            notify.mobile_app_{{ (dev_name | slugify) | replace('-', '_') }}
          {% endif %}
        {% endif %}

      notify_service_4: >
        {% set dev = inputs.notify_device_4 | default('') | string | trim %}
        {% if dev != '' %}
          {% set dev_name = device_attr(dev, 'name') %}
          {% if dev_name is string and (dev_name | trim) != '' %}
            notify.mobile_app_{{ (dev_name | slugify) | replace('-', '_') }}
          {% endif %}
        {% endif %}

      # --- Personen-Listen ---
      all_persons: >
        {{ [inputs.person_1, inputs.person_2, inputs.person_3, inputs.person_4]
           | reject('eq', '') | list }}

      all_notify_targets: >
        {% set ns = namespace(items=[]) %}
        {% for svc in [notify_service_1, notify_service_2, notify_service_3, notify_service_4] %}
          {% if (svc | trim) != '' %}
            {% set ns.items = ns.items + [svc | trim] %}
          {% endif %}
        {% endfor %}
        {{ ns.items | join(',') }}

  # ---------------------------------------------------------------------------
  #  ROUTING: Tür-Szenarien vs. Health-Watchdog
  # ---------------------------------------------------------------------------
  - choose:
      # =====================================================================
      #  TUER GEÖFFNET → Szenarien 1, 2 & 3 parallel
      # =====================================================================
      - conditions:
          - condition: trigger
            id: door_opened
        sequence:
          # --- Debug: Automation gestartet ---
          - if:
              - condition: template
                value_template: "{{ inputs.debug_enabled | bool(false) }}"
            then:
              - variables:
                  persons_home_debug: >
                    {% set ns = namespace(home=[], away=[]) %}
                    {% for p in all_persons %}
                      {% set name = state_attr(p, 'friendly_name') | default(p) %}
                      {% if is_state(p, 'home') %}
                        {% set ns.home = ns.home + [name] %}
                      {% else %}
                        {% set ns.away = ns.away + [name ~ ' (' ~ states(p) ~ ')'] %}
                      {% endif %}
                    {% endfor %}
                    Zuhause: {{ ns.home | join(', ') if ns.home | length > 0 else 'niemand' }}. Abwesend: {{ ns.away | join(', ') if ns.away | length > 0 else 'niemand' }}.
              - action: "{{ notify_service_1 | trim }}"
                data:
                  title: "🐛 Automation gestartet"
                  message: >
                    Tür-Offen Automation ausgelöst.
                    Sensor: {{ inputs.door_sensor }} = {{ states(inputs.door_sensor) }}.
                    {{ persons_home_debug }}
                  data:
                    tag: door_debug_start
            continue_on_error: true

          # --- Snapshot: War jemand zuhause als die Tür aufging? ---
          - variables:
              anyone_home_at_open: >
                {{ expand(all_persons)
                   | selectattr('state', 'eq', 'home')
                   | list | length > 0 }}

          # --- Parallele Szenarien ---
          - parallel:
              # =============================================================
              #  SZENARIO 1: 🔔 Tür-Offen Erinnerung
              #  Person IST in zone.home → Erinnerung an diese Person
              #  Eskaliert von normal → kritisch nach X Minuten
              # =============================================================
              - sequence:
                  - delay:
                      seconds: !input person_left_duration

                  # Tür noch offen?
                  - condition: state
                    entity_id: !input door_sensor
                    state: "on"

                  # Jemand muss zuhause sein — sonst greift Szenario 3
                  # Race-Fix: Prüfe JETZT UND ob bei Tür-Öffnung jemand da war
                  - condition: template
                    value_template: >
                      {{ (anyone_home_at_open | bool(false)) and
                         (expand(all_persons)
                         | selectattr('state', 'eq', 'home')
                         | list | length > 0) }}

                  # Debug
                  - if:
                      - condition: template
                        value_template: "{{ inputs.debug_enabled | bool(false) }}"
                    then:
                      - action: "{{ notify_service_1 | trim }}"
                        data:
                          title: "🐛 Szenario: Tür-Offen"
                          message: "Tür seit {{ inputs.person_left_duration }}s offen. Sende Erinnerung an Personen die zuhause sind..."
                          data:
                            tag: door_debug_forgot
                    continue_on_error: true

                  # Repeat bis Tür zu (Safety-Limit: max 200 Iterationen)
                  - repeat:
                      while:
                        - condition: state
                          entity_id: !input door_sensor
                          state: "on"
                        - condition: template
                          value_template: "{{ repeat.index <= 200 }}"
                      sequence:
                        - variables:
                            # Berechne vergangene Zeit seit Tür-Öffnung
                            _elapsed_s: >
                              {{ (inputs.person_left_duration | int(60)) + ((repeat.index - 1) * (inputs.person_left_repeat | int(60))) }}
                            _elapsed_min: >
                              {{ ((_elapsed_s | int(60)) / 60) | round(0) }}
                            # Eskalation: nach X Minuten auf kritisch wechseln
                            _critical_threshold_s: >
                              {{ (inputs.person_left_critical_after | int(5)) * 60 }}
                            _is_critical: >
                              {{ (_elapsed_s | int(0)) >= (_critical_threshold_s | int(300)) }}
                            # Dynamische Personen-Liste: nur Home + Notify-Service vorhanden
                            _home_targets: >
                              {% set ns = namespace(items=[]) %}
                              {% set persons = [
                                {'person': inputs.person_1, 'service': notify_service_1},
                                {'person': inputs.person_2, 'service': notify_service_2},
                                {'person': inputs.person_3, 'service': notify_service_3},
                                {'person': inputs.person_4, 'service': notify_service_4}
                              ] %}
                              {% for p in persons %}
                                {% if p.person | string | trim != '' and is_state(p.person, 'home') and (p.service | trim) != '' %}
                                  {% set ns.items = ns.items + [p.service | trim] %}
                                {% endif %}
                              {% endfor %}
                              {{ ns.items }}

                        - repeat:
                            for_each: "{{ _home_targets }}"
                            sequence:
                              - action: "{{ repeat.item | trim }}"
                                data:
                                  title: "{{ '🚨' if _is_critical | bool(false) else '🔔' }} Tür offen"
                                  message: "Wohnungstüre seit {{ _elapsed_min }} min offen!"
                                  data:
                                    tag: door_open
                                    push:
                                      interruption-level: "{{ 'critical' if _is_critical | bool(false) else 'active' }}"
                                      sound:
                                        name: "{{ 'default' }}"
                                        critical: "{{ 1 if _is_critical | bool(false) else 0 }}"
                                        volume: 1.0
                                    ttl: 0
                                    priority: high
                                    channel: "{{ 'alarm_stream' if _is_critical | bool(false) else 'default' }}"
                                continue_on_error: true

                        # Warte auf Tür-Schließung oder Repeat-Intervall
                        - wait_for_trigger:
                            - trigger: state
                              entity_id: !input door_sensor
                              to: "off"
                          timeout:
                            seconds: !input person_left_repeat
                          continue_on_error: true

                        # Sicherheitscheck
                        - condition: state
                          entity_id: !input door_sensor
                          state: "on"
                continue_on_error: true

              # =============================================================
              #  SZENARIO 2: 🚨 Fallback-Alarm (Tür lange offen)
              #  ALLE Personen werden benachrichtigt
              # =============================================================
              - sequence:
                  - delay:
                      minutes: !input long_open_duration

                  # Tür noch offen?
                  - condition: state
                    entity_id: !input door_sensor
                    state: "on"

                  # Debug
                  - if:
                      - condition: template
                        value_template: "{{ inputs.debug_enabled | bool(false) }}"
                    then:
                      - action: "{{ notify_service_1 | trim }}"
                        data:
                          title: "🐛 Szenario: Fallback"
                          message: "Tür seit {{ inputs.long_open_duration }} Min offen! Sende Fallback-Alarm an alle. Kritisch: {{ inputs.long_open_critical }}."
                          data:
                            tag: door_debug_fallback
                    continue_on_error: true

                  # Repeat bis Tür zu (Safety-Limit: 200)
                  - repeat:
                      while:
                        - condition: state
                          entity_id: !input door_sensor
                          state: "on"
                        - condition: template
                          value_template: "{{ repeat.index <= 200 }}"
                      sequence:
                        - variables:
                            fallback_targets: >
                              {{ (all_notify_targets | trim).split(',') if (all_notify_targets | trim) != '' else [] }}
                        - repeat:
                            for_each: "{{ fallback_targets }}"
                            sequence:
                              - action: "{{ repeat.item | trim }}"
                                data:
                                  title: "{{ '🚨' if inputs.long_open_critical | bool(false) else '🔔' }} Tür offen — Fallback-Alarm"
                                  message: "Wohnungstür steht seit {{ inputs.long_open_duration }} Minuten offen!"
                                  data:
                                    tag: door_open
                                    push:
                                      interruption-level: "{{ 'critical' if inputs.long_open_critical | bool(false) else 'active' }}"
                                      sound:
                                        name: "{{ 'alarm.caf' if inputs.long_open_critical | bool(false) else 'default' }}"
                                        critical: "{{ 1 if inputs.long_open_critical | bool(false) else 0 }}"
                                        volume: 1.0
                                    ttl: 0
                                    priority: high
                                    channel: "{{ 'alarm_stream' if inputs.long_open_critical | bool(false) else 'default' }}"
                                continue_on_error: true

                        # Warte auf Tür-Schließung oder Repeat-Intervall
                        - wait_for_trigger:
                            - trigger: state
                              entity_id: !input door_sensor
                              to: "off"
                          timeout:
                            seconds: !input long_open_repeat
                          continue_on_error: true

                        # Sicherheitscheck
                        - condition: state
                          entity_id: !input door_sensor
                          state: "on"
                continue_on_error: true

              # =============================================================
              #  SZENARIO 3: 🔐 Einbruch-Erkennung
              #  KEINE Person zuhause + Tür offen → Kritischer Alarm an ALLE
              # =============================================================
              - sequence:
                  - delay:
                      seconds: !input breakin_duration

                  # Tür noch offen?
                  - condition: state
                    entity_id: !input door_sensor
                    state: "on"

                  # Niemand zuhause?
                  - condition: template
                    value_template: >
                      {% set persons = all_persons %}
                      {{ persons | length > 0 and
                         expand(persons)
                         | selectattr('state', 'eq', 'home')
                         | list | length == 0 }}

                  # Debug
                  - if:
                      - condition: template
                        value_template: "{{ inputs.debug_enabled | bool(false) }}"
                    then:
                      - action: "{{ notify_service_1 | trim }}"
                        data:
                          title: "🐛 Szenario: Einbruch"
                          message: "Tür seit {{ inputs.breakin_duration }}s offen, niemand zuhause! Sende Einbruch-Alarm an alle."
                          data:
                            tag: door_debug_breakin
                    continue_on_error: true

                  # Repeat bis Tür zu ODER jemand heimkommt (Safety-Limit: 200)
                  - repeat:
                      while:
                        - condition: state
                          entity_id: !input door_sensor
                          state: "on"
                        - condition: template
                          value_template: >
                            {{ expand(all_persons)
                               | selectattr('state', 'eq', 'home')
                               | list | length == 0 }}
                        - condition: template
                          value_template: "{{ repeat.index <= 200 }}"
                      sequence:
                        - variables:
                            breakin_targets: >
                              {{ (all_notify_targets | trim).split(',') if (all_notify_targets | trim) != '' else [] }}
                        - repeat:
                            for_each: "{{ breakin_targets }}"
                            sequence:
                              - action: "{{ repeat.item | trim }}"
                                data:
                                  title: "🚨 SICHERHEITSWARNUNG"
                                  message: "Eventueller Einbruch — Tür wurde geöffnet und niemand ist zuhause!"
                                  data:
                                    tag: door_open
                                    push:
                                      interruption-level: critical
                                      sound:
                                        name: alarm.caf
                                        critical: 1
                                        volume: 1.0
                                    ttl: 0
                                    priority: high
                                    channel: alarm_stream
                                continue_on_error: true

                        # Warte auf Tür-Schließung oder Repeat-Intervall
                        - wait_for_trigger:
                            - trigger: state
                              entity_id: !input door_sensor
                              to: "off"
                          timeout:
                            seconds: !input breakin_repeat
                          continue_on_error: true

                        # Sicherheitscheck
                        - condition: state
                          entity_id: !input door_sensor
                          state: "on"
                continue_on_error: true

      # =====================================================================
      #  TÜR GESCHLOSSEN → Notifications aufräumen
      # =====================================================================
      - conditions:
          - condition: trigger
            id: door_closed
        sequence:
          - variables:
              _cleanup_targets: >
                {% set ns = namespace(items=[]) %}
                {% for svc in [notify_service_1, notify_service_2, notify_service_3, notify_service_4] %}
                  {% if (svc | trim) != '' %}
                    {% set ns.items = ns.items + [svc | trim] %}
                  {% endif %}
                {% endfor %}
                {{ ns.items }}
          - repeat:
              for_each: "{{ _cleanup_targets }}"
              sequence:
                - action: "{{ repeat.item | trim }}"
                  data:
                    message: clear_notification
                    data:
                      tag: door_open
                  continue_on_error: true

      # =====================================================================
      #  HEALTH-WATCHDOG: 🩺 Sensor unavailable / unknown
      # =====================================================================
      - conditions:
          - condition: trigger
            id:
              - sensor_unavailable
              - sensor_unknown
        sequence:
          # Health-Watchdog aktiviert?
          - condition: template
            value_template: "{{ inputs.health_enabled | bool(true) }}"

          # Notify-Service verfügbar?
          - condition: template
            value_template: "{{ (notify_service_1 | trim) != '' }}"

          - variables:
              sensor_state: "{{ states(inputs.door_sensor) }}"
              last_changed: >
                {{ states[inputs.door_sensor].last_changed | default('unbekannt') }}

          # Debug
          - if:
              - condition: template
                value_template: "{{ inputs.debug_enabled | bool(false) }}"
            then:
              - action: "{{ notify_service_1 | trim }}"
                data:
                  title: "🐛 Health-Watchdog ausgelöst"
                  message: >
                    Sensor {{ inputs.door_sensor }} ist {{ sensor_state }} seit {{ last_changed }}.
                    Trigger-ID: {{ trigger.id }}.
                  data:
                    tag: door_debug_health
            continue_on_error: true

          # Erste Warnung + Repeat-Loop
          - repeat:
              while:
                - condition: template
                  value_template: >
                    {{ states(inputs.door_sensor) in ['unavailable', 'unknown'] }}
                - condition: template
                  value_template: "{{ repeat.index <= 100 }}"
              sequence:
                - action: "{{ notify_service_1 | trim }}"
                  data:
                    title: "🩺 Sensor-Ausfall"
                    message: >
                      Tür-Sensor {{ state_attr(inputs.door_sensor, 'friendly_name') | default(inputs.door_sensor) }} ist {{ states(inputs.door_sensor) }}!
                      Tür-Überwachung ist deaktiviert — kein Einbruch- oder Vergessen-Schutz aktiv.
                      Bitte Sensor prüfen: Batterie, Zigbee-Verbindung, HA-Integration.
                    data:
                      tag: door_health_alert
                      push:
                        interruption-level: active
                      ttl: 0
                      priority: high
                  continue_on_error: true

                # Warte auf Recovery oder Repeat-Intervall
                - wait_for_trigger:
                    - trigger: state
                      entity_id: !input door_sensor
                      not_to:
                        - "unavailable"
                        - "unknown"
                  timeout:
                    minutes: !input health_repeat
                  continue_on_error: true

          # Recovery-Benachrichtigung: Sensor ist wieder da
          - if:
              - condition: template
                value_template: >
                  {{ states(inputs.door_sensor) not in ['unavailable', 'unknown'] }}
            then:
              - action: "{{ notify_service_1 | trim }}"
                data:
                  title: "✅ Sensor wieder verfügbar"
                  message: >
                    Tür-Sensor {{ state_attr(inputs.door_sensor, 'friendly_name') | default(inputs.door_sensor) }} ist wieder {{ states(inputs.door_sensor) }}.
                    Tür-Überwachung ist wieder vollständig aktiv.
                  data:
                    tag: door_health_alert
            continue_on_error: true
